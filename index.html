<!DOCTYPE html>
<html>
<head><title>Product Dashboard</title></head>
<body>
    <h1>📊 Product Dashboard</h1>
    <div id="stats"></div>
    <div id="products"></div>

<script type="module">
    const api = 'https://fakestoreapi.com/products';
    
    const loadData = async () => {
        try {
            const res = await fetch(api);
            if (!res.ok) throw new Error('Failed to load');
            const products = await res.json();
            
            const total = products.length;
            const avgPrice = (products.reduce((sum, p) => sum + p.price, 0) / total).toFixed(2);
            const categories = [...new Set(products.map(p => p.category))];
            
            document.getElementById('stats').innerHTML = 
                `📦 ${total} products | 💰 $${avgPrice} avg | 🏷️ ${categories.length} categories`;
            
            document.getElementById('products').innerHTML = products.slice(0, 6).map(p => 
                `<div style="border:1px solid #ddd;padding:10px;margin:5px;border-radius:8px;display:inline-block;width:200px">
                    <img src="${p.image}" width="100" height="100" style="object-fit:contain"><br>
                    <strong>${p.title.slice(0, 20)}...</strong><br>
                    $${p.price} | ⭐ ${p.rating.rate}
                </div>`
            ).join('');
        } catch (e) {
            document.getElementById('stats').innerHTML = `❌ ${e.message}`;
        }
    };
    
    await loadData();
    console.log('✅ Dashboard ready! ES Modules + fetch + async/await + destructuring');
</script>
</body>
</html>
